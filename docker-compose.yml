version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env
    volumes:
      - ./Backend/src:/app/src
      - ./Backend/prisma:/app/prisma
      - /app/node_modules

  ai-core:
    build:
      context: ./Ai-Core
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./Ai-Core/.env
    volumes:
      - ./Ai-Core/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

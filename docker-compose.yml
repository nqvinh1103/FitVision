version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env
    environment:
      # Override REDIS_URL để trỏ vào container redis thay vì localhost
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./Backend/src:/app/src
      - ./Backend/prisma:/app/prisma

  ai-core:
    build:
      context: ./Ai-Core
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./Ai-Core/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
